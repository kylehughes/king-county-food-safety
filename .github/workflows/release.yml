name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify tag matches package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(python3 -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject.toml version $package_version."
            exit 1
          fi

      - name: Install package and coverage
        run: python -m pip install . coverage

      - name: Run tests with coverage
        run: |
          PYTHONPATH=src coverage run --source=src/king_county_food_safety -m unittest discover -s tests
          coverage report --fail-under=100

      - name: Build distributions
        run: |
          python -m pip install build
          python -m build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
